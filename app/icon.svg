<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13233B"/>
      <stop offset="1" stop-color="#0A1320"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="58%">
      <stop offset="0" stop-color="#C9A227" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBEDB8"/>
      <stop offset="0.4" stop-color="#E7C45A"/>
      <stop offset="1" stop-color="#B8911E"/>
    </linearGradient>
    <linearGradient id="goldSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A6D18"/>
      <stop offset="1" stop-color="#574109"/>
    </linearGradient>
  </defs>

  <!-- navy tile + subtle gold ring + inner glow -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <rect x="2.9" y="2.9" width="58.2" height="58.2" rx="14" fill="none"
        stroke="#C9A227" stroke-opacity="0.38" stroke-width="1.6"/>
  <ellipse cx="32" cy="29" rx="23" ry="23" fill="url(#glow)"/>

  <!-- extruded side face (3D depth, offset down-right) -->
  <path d="M42,17 L42,47 L49,47 L49,53 L21,53 L21,47 L31,47 L31,28 L24,31 L19,24 Z"
        fill="url(#goldSide)"/>

  <!-- front face of the numeral 1 with rim highlight -->
  <path d="M39,14 L39,44 L46,44 L46,50 L18,50 L18,44 L28,44 L28,25 L21,28 L16,21 Z"
        fill="url(#goldFace)" stroke="#FBEFC4" stroke-opacity="0.6"
        stroke-width="0.8" stroke-linejoin="round"/>
</svg>
