[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled Functions live in netlify/functions/ and declare their own
# `schedule`. drip-cron runs every 15 minutes to dispatch due drip messages
# (per-minute polling kept Neon's compute awake 24/7 and exhausted the free quota).
